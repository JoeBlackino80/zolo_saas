version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Bratislava
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      next:
        patterns:
          - next
          - "@next/*"
      supabase:
        patterns:
          - "@supabase/*"
      sentry:
        patterns:
          - "@sentry/*"
      upstash:
        patterns:
          - "@upstash/*"
      types:
        patterns:
          - "@types/*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      timezone: Europe/Bratislava
